[workspace]
members = ["cobalt_backend", "cobalt_cloud"]
resolver = "2"

[workspace.dependencies.axum]
version = "0.8.8"
features = ["multipart", "tracing"]

[workspace.dependencies.sqlx]
version = "0.8"
features = ["runtime-tokio", "sqlite", "macros", "migrate"]

[workspace.dependencies.tokio]
version = "1"
features = ["full"]
