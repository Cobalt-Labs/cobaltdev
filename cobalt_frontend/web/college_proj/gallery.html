<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Spotlight Event</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">🌟 Spotlight</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <!-- Gallery Section -->
    <div class="container section">
        <h2 class="section-title">Event Gallery</h2>
        <p class="subtitle">Memories and inspiration from our vibrant themed days.</p>
        
        <div class="gallery-grid">
            <!-- 
              NOTE: If you have your own images in the college_proj folder, 
              replace the 'src' link with the filename (e.g., src="my-image.jpg")
            -->
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=600&q=80" alt="Retro Day">
                <div class="caption">Retro Vibes</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1541532713592-79a0317b6b77?w=600&q=80" alt="Party Crowd">
                <div class="caption">Event Energy</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600&q=80" alt="Tradition">
                <div class="caption">Traditional Pride</div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=600&q=80" alt="Style">
                <div class="caption">Twinning Day</div>
            </div>
        </div>
    </div>

    <!-- Simple Footer -->
    <footer>
        <p>&copy; <span id="year"></span> Spotlight Event. All rights reserved.</p>
    </footer>

    <!-- Link to JS file -->
    <script src="script.js"></script>
</body>
</html>
